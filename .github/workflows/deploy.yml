name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Copy files to VPS via rsync
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          HOST="${{ secrets.SSH_HOST }}"
          if [[ "$HOST" == *":"* ]] && [[ "$HOST" != *"["* ]]; then
            HOST="[$HOST]"
          fi
          sshpass -e rsync -avz -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" --exclude='.git' ./ ${{ secrets.SSH_USER }}@$HOST:${{ secrets.REMOTE_PATH }}/

      - name: Deploy SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          HOST="${{ secrets.SSH_HOST }}"
          if [[ "$HOST" == *":"* ]] && [[ "$HOST" != *"["* ]]; then
            HOST="[$HOST]"
          fi
          sshpass -e ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@$HOST 'bash -lc "cd ${{ secrets.REMOTE_PATH }} && pm2 restart qi-bot --update-env || pm2 start src/index.js --name qi-bot --interpreter node && pm2 save"'
